<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f9f5ff;
}

/* LOGIN */
#login {
  text-align:center;
  padding:40px;
}

input {
  padding:12px;
  width:80%;
  border-radius:10px;
  border:1px solid #ddd;
}

button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff4d6d,#c77dff);
  color:white;
  margin-top:10px;
  cursor:pointer;
}

/* PERFIL */
.header {
  text-align:center;
  padding:20px;
}

.header img {
  width:80px;
  height:80px;
  border-radius:50%;
}

/* PROGRESSO */
.progress-container {
  padding:15px;
}

.progress-bar {
  width:100%;
  height:10px;
  background:#eee;
  border-radius:10px;
}

.progress {
  height:10px;
  width:0%;
  background:linear-gradient(45deg,#ff4d6d,#c77dff);
  border-radius:10px;
}

/* CARDS */
.container {
  padding:15px;
}

.card {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  cursor:pointer;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* AULA */
#aula {
  display:none;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>✨ Bem-vinda</h2>
  <input type="email" id="email" placeholder="Digite seu e-mail">
  <br>
  <button onclick="entrar()">Entrar</button>
</div>

<!-- HOME -->
<div id="home" style="display:none;">

  <div class="header">
    <img src="https://i.imgur.com/8Km9tLL.png">
    <h2>Hola, Artesana 💖</h2>
  </div>

  <!-- PROGRESSO -->
  <div class="progress-container">
    <p>Seu progresso</p>
    <div class="progress-bar">
      <div id="progress" class="progress"></div>
    </div>
  </div>

  <div class="container">

    <div class="card" onclick="abrirModulo(1)">Módulo 1</div>
    <div class="card" onclick="abrirModulo(2)">Módulo 2</div>
    <div class="card" onclick="abrirModulo(3)">Módulo 3</div>
    <div class="card" onclick="abrirModulo(4)">Módulo 4</div>
    <div class="card" onclick="abrirModulo(5)">Módulo 5</div>

    <div class="card" onclick="abrirBonus()">🎁 Bônus</div>

  </div>

</div>

<!-- AULAS -->
<div id="aulas" style="display:none;" class="container"></div>

<!-- AULA -->
<div id="aula"></div>

<script>

// LOGIN
function entrar(){
  let email = document.getElementById("email").value;

  if(email == ""){
    alert("Digite seu e-mail");
    return;
  }

  localStorage.setItem("email", email);

  document.getElementById("login").style.display="none";
  document.getElementById("home").style.display="block";

  atualizarProgresso();
}

// AUTO LOGIN
window.onload = function(){
  let email = localStorage.getItem("email");

  if(email){
    document.getElementById("login").style.display="none";
    document.getElementById("home").style.display="block";
  }

  atualizarProgresso();
}

// PROGRESSO
function concluirAula(id){
  localStorage.setItem("aula"+id,"ok");
  atualizarProgresso();
}

function atualizarProgresso(){
  let total = 10;
  let feitas = 0;

  for(let i=1;i<=total;i++){
    if(localStorage.getItem("aula"+i)){
      feitas++;
    }
  }

  let porcentagem = (feitas/total)*100;
  document.getElementById("progress").style.width = porcentagem + "%";
}

// MÓDULOS
function abrirModulo(modulo){

  document.getElementById("home").style.display="none";
  document.getElementById("aulas").style.display="block";

  let conteudo = "";

  if(modulo == 1){
    conteudo = `
      <h2>Módulo 1</h2>
      <div class="card" onclick="abrirAula('4JGlMIsn3o8',1)">Aula 1</div>
      <div class="card" onclick="abrirAula('TknQZLggxxY',2)">Aula 2</div>
    `;
  }

  if(modulo == 2){
    conteudo = `
      <h2>Módulo 2</h2>
      <div class="card" onclick="abrirAula('mpOl2ue1eZo',3)">Aula 1</div>
    `;
  }

  if(modulo == 3){
    conteudo = `
      <h2>Módulo 3</h2>
      <div class="card" onclick="abrirAula('4JGlMIsn3o8',4)">Aula 1</div>
    `;
  }

  if(modulo == 4){
    conteudo = `
      <h2>Módulo 4</h2>
      <div class="card" onclick="abrirAula('TknQZLggxxY',5)">Aula 1</div>
    `;
  }

  if(modulo == 5){
    conteudo = `
      <h2>Módulo 5</h2>
      <div class="card" onclick="abrirAula('mpOl2ue1eZo',6)">Aula 1</div>
    `;
  }

  document.getElementById("aulas").innerHTML = conteudo + `
    <br>
    <button onclick="voltarModulos()">⬅ Voltar</button>
  `;
}

// BÔNUS
function abrirBonus(){

  document.getElementById("home").style.display="none";
  document.getElementById("aulas").style.display="block";

  document.getElementById("aulas").innerHTML = `
    <h2>🎁 Bônus</h2>

    <div class="card" onclick="abrirAula('4JGlMIsn3o8',7)">Bônus 1</div>
    <div class="card" onclick="abrirAula('TknQZLggxxY',8)">Bônus 2</div>

    <br>
    <button onclick="voltarModulos()">⬅ Voltar</button>
  `;
}

// AULA
function abrirAula(videoId,id){

  document.getElementById("aulas").style.display="none";
  document.getElementById("aula").style.display="block";

  document.getElementById("aula").innerHTML = `
    <iframe width="100%" height="250"
    src="https://www.youtube.com/embed/${videoId}"></iframe>

    <br><br>

    <button onclick="concluirAula(${id})">✅ Concluir aula</button>

    <br><br>

    <a href="https://drive.google.com/uc?export=download&id=1R2P2adIHsgKgn8rI_UQb8jIPK_ZFxCh3">
      <button>📄 Baixar PDF</button>
    </a>

    <br><br>

    <button onclick="voltarAulas()">⬅ Voltar</button>
  `;
}

// VOLTAR
function voltarModulos(){
  document.getElementById("home").style.display="block";
  document.getElementById("aulas").style.display="none";
}

function voltarAulas(){
  document.getElementById("aulas").style.display="block";
  document.getElementById("aula").style.display="none";
}

</script>

</body>
</html>
