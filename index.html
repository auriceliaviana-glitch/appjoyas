            description: 'Dicas de iluminación y escenario para fotos que venden.',
            videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
            isFree: true,
            duration: '22:00',
            thumbnail: 'https://images.unsplash.com/photo-1606760227091-3dd870d97f1d?auto=format&fit=crop&q=80&w=400'
        },
        {
            id: 'l10',
            title: 'Cómo vender en Instagram',
            description: 'Estrategias de publicación y engagement para atraer clientes.',
            videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
            isFree: true,
            duration: '25:30',
            thumbnail: 'https://images.unsplash.com/photo-1515488042361-ee00e0ddd4e4?auto=format&fit=crop&q=80&w=400'
        },
        {
            id: 'l11',
            title: 'Cómo definir precios',
            description: 'Cómo calcular tus costos y asegurar tu ganancia.',
            videoUrl: 'https://www.youtube.com/embed/dQw4w9WgXcQ',
            isFree: true,
            duration: '15:00',
            thumbnail: 'https://images.unsplash.com/photo-1584992236310-6edddc08acff?auto=format&fit=crop&q=80&w=400'
        }
    ];

    const BONUS_ITEMS = [
        { id: 'b1', title: 'Moldes para descargar (PDF)', description: 'Modelos listos para imprimir y usar como guía.', icon: 'file-text', url: '#' },
        { id: 'b2', title: 'Checklist de materiales', description: 'Lista completa para no olvidar nada al comprar.', icon: 'check-square', url: '#' },
        { id: 'b3', title: 'Ideas de productos para vender', description: 'Sugerencias de otras piezas rentables con porcelana fría.', icon: 'lightbulb', url: '#' }
    ];

    // --- COMPONENTS ---

    const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
        useEffect(() => {
            if (window.lucide) window.lucide.createIcons();
        }, [name]);
        return <i data-lucide={name} style={{ width: size, height: size }} className={className} fill={fill}></i>;
    };

    function Login({ onLogin }) {
        const [email, setEmail] = useState('');

        const handleSubmit = (e) => {
            e.preventDefault();
            if (email) onLogin();
        };

        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-6">
                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    className="w-full max-w-sm space-y-8"
                >
                    <div className="text-center space-y-4">
                        <div className="w-32 h-32 rounded-[40px] overflow-hidden mx-auto shadow-2xl border-4 border-white relative">
                            <img src="https://iili.io/BCD6rPI.png" alt="Joyas Rentables" className="w-full h-full object-cover" />
                        </div>
                        <div className="space-y-1">
                            <h1 className="text-2xl font-black text-slate-800 italic tracking-tight uppercase">Joyas Rentables</h1>
                            <p className="text-slate-400 text-sm font-medium">¡Bienvenida, artesana!</p>
                        </div>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="relative">
                            <Icon name="mail" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                            <input 
                                type="email" 
                                placeholder="Tu email"
                                value={email}
                                onChange={(e) => setEmail(e.target.value)}
                                className="w-full pl-12 pr-4 py-4 bg-white rounded-2xl border border-slate-100 shadow-sm focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all"
                                required
                            />
                        </div>
                        <button type="submit" className="w-full py-4 bg-primary-dark text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 group active:scale-95 transition-all">
                            Acceder al Curso
                            <Icon name="arrow-right" size={18} className="group-hover:translate-x-1 transition-transform" />
                        </button>
                    </form>
                </motion.div>
            </div>
        );
    }

    function App() {
        const [isLoggedIn, setIsLoggedIn] = useState(false);
        const [activeTab, setActiveTab] = useState('home');
        const [selectedLesson, setSelectedLesson] = useState(null);
        const [progress, setProgress] = useState(() => {
            const saved = localStorage.getItem('joyas_rentables_progress');
            return saved ? JSON.parse(saved) : { completedLessonIds: [], favoriteLessonIds: [], lastWatchedLessonId: null };
        });

        useEffect(() => {
            localStorage.setItem('joyas_rentables_progress', JSON.stringify(progress));
        }, [progress]);

        if (!isLoggedIn) return <Login onLogin={() => setIsLoggedIn(true)} />;

        const toggleComplete = (id) => {
            setProgress(prev => ({
                ...prev,
                completedLessonIds: prev.completedLessonIds.includes(id) 
                    ? prev.completedLessonIds.filter(i => i !== id) 
                    : [...prev.completedLessonIds, id]
            }));
        };

        const toggleFavorite = (id) => {
            setProgress(prev => ({
                ...prev,
                favoriteLessonIds: prev.favoriteLessonIds.includes(id) 
                    ? prev.favoriteLessonIds.filter(i => i !== id) 
                    : [...prev.favoriteLessonIds, id]
            }));
        };

        const renderHome = () => (
            <div className="space-y-8 pb-24">
                <div className="px-6 pt-8">
                    <div className="w-full rounded-[48px] overflow-hidden shadow-2xl border-4 border-white relative">
                        <img src="https://iili.io/BCD6rPI.png" alt="Capa" className="w-full h-auto block" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent flex items-end p-6">
                            <div className="text-white">
                                <p className="text-[10px] font-bold uppercase tracking-[0.2em] opacity-80">Curso Oficial</p>
                                <h2 className="text-xl font-black italic uppercase">Joyas Rentables</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div className="px-6 flex items-center gap-4">
                    <div className="w-16 h-16 rounded-full overflow-hidden border-2 border-primary shadow-lg flex-shrink-0">
                        <img src="https://iili.io/BCD6rPI.png" alt="Isabella" className="w-full h-full object-cover" />
                    </div>
                    <div>
                        <div className="flex items-center gap-2 text-primary-dark mb-1">
                            <Icon name="sparkles" size={18} />
                            <span className="text-xs font-bold uppercase tracking-widest">Joyas Rentables Sin Horno</span>
                        </div>
                        <h1 className="text-3xl font-bold text-slate-800">Hola, ¡Artesana! ✨</h1>
                        <p className="text-slate-500 mt-1 text-sm">Bienvenida al curso de <span className="font-bold text-primary-dark">Isabella Torres</span>.</p>
                    </div>
                </div>

                <div className="px-6">
                    <div className="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-4">
                        <div className="flex items-center justify-between">
                            <h3 className="font-bold text-slate-800 text-sm">Tu Progreso</h3>
                            <span className="text-xs font-bold text-primary-dark">
                                {Math.round((progress.completedLessonIds.length / COURSE_LESSONS.length) * 100)}%
                            </span>
                        </div>
                        <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                            <motion.div 
                                initial={{ width: 0 }}
                                animate={{ width: `${(progress.completedLessonIds.length / COURSE_LESSONS.length) * 100}%` }}
                                className="h-full bg-primary-dark"
                            />
                        </div>
                    </div>
                </div>

                <div className="px-6 space-y-6">
                    <h2 className="text-xl font-bold text-slate-800">Módulos del Curso</h2>
                    <div className="space-y-4">
                        {COURSE_MODULES.map(module => (
                            <div key={module.id} className="space-y-3">
                                <div className="flex items-center gap-2">
                                    <div className="w-8 h-8 bg-primary/10 rounded-lg flex items-center justify-center text-primary-dark">
                                        <Icon name="book-open" size={16} />
                                    </div>
                                    <h3 className="font-bold text-slate-800">{module.title}</h3>
                                </div>
                                <div className="grid gap-3">
                                    {module.lessonIds.map(lessonId => {
                                        const lesson = COURSE_LESSONS.find(l => l.id === lessonId);
                                        const isCompleted = progress.completedLessonIds.includes(lesson.id);
                                        return (
                                            <motion.div
                                                key={lesson.id}
                                                whileTap={{ scale: 0.98 }}
                                                onClick={() => setSelectedLesson(lesson)}
                                                className={cn("p-4 rounded-[24px] flex items-center justify-between border transition-all cursor-pointer", isCompleted ? "bg-green-50/50 border-green-100" : "bg-white border-slate-100 shadow-sm")}
                                            >
                                                <div className="flex items-center gap-4">
                                                    <div className={cn("w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xs overflow-hidden relative", isCompleted ? "bg-green-500 text-white" : "bg-slate-50")}>
                                                        {isCompleted ? <Icon name="check-circle-2" size={20} /> : <img src={lesson.thumbnail} className="w-full h-full object-cover opacity-40" />}
                                                    </div>
                                                    <div>
                                                        <h4 className="font-bold text-slate-800 text-xs">{lesson.title}</h4>
                                                        <p className="text-[10px] text-slate-400 font-medium">{lesson.duration}</p>
                                                    </div>
                                                </div>
                                                <Icon name="play" size={14} className="text-primary-dark mr-1" />
                                            </motion.div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const renderLessonPlayer = (lesson) => (
            <div className="fixed inset-0 bg-slate-950 z-50 flex flex-col">
                <div className="p-4 pt-12 relative">
                    <button onClick={() => setSelectedLesson(null)} className="absolute top-4 left-6 w-10 h-10 bg-white/10 text-white rounded-full flex items-center justify-center backdrop-blur-md z-10 hover:bg-white/20 transition-colors">
                        <Icon name="x" size={20} />
                    </button>
                    <div className="relative aspect-video bg-black rounded-[32px] overflow-hidden shadow-2xl border border-white/10">
                        <iframe src={lesson.videoUrl} className="w-full h-full" allowFullScreen />
                    </div>
                </div>

                <div className="flex-1 overflow-y-auto p-8 space-y-8">
                    <div className="flex items-start justify-between gap-4">
                        <div className="space-y-2">
                            <h1 className="text-2xl font-black text-white italic tracking-tight uppercase leading-tight">{lesson.title}</h1>
                            <p className="text-white/90 text-sm font-medium leading-relaxed">{lesson.description}</p>
                        </div>
                        <button onClick={() => toggleFavorite(lesson.id)} className={cn("p-3 rounded-2xl transition-all active:scale-90", progress.favoriteLessonIds.includes(lesson.id) ? "text-pink-500 bg-pink-500/10 border border-pink-500/20" : "text-slate-500 bg-white/5 border border-white/10")}>
                            <Icon name="heart" size={24} fill={progress.favoriteLessonIds.includes(lesson.id) ? "currentColor" : "none"} />
                        </button>
                    </div>

                    {lesson.materialUrl && (
                        <div className="space-y-4">
                            <div className="flex items-center gap-2">
                                <div className="w-1 h-6 bg-primary rounded-full" />
                                <h3 className="text-white font-bold text-lg">Material de Apoyo</h3>
                            </div>
                            <div className="bg-white/5 p-6 rounded-[32px] border border-white/10 text-center space-y-4">
                                <a href={lesson.materialUrl} target="_blank" className="inline-flex items-center gap-3 px-8 py-4 bg-primary text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                                    <Icon name="download" size={20} />
                                    📄 Descargar PDF de la clase
                                </a>
                                <p className="text-slate-400 text-xs font-medium">Descarga el material para acompañar esta clase.</p>
                            </div>
                        </div>
                    )}

                    <div className="space-y-4">
                        <button onClick={() => toggleComplete(lesson.id)} className={cn("w-full py-5 rounded-[24px] font-bold flex items-center justify-center gap-3 transition-all active:scale-95 shadow-xl", progress.completedLessonIds.includes(lesson.id) ? "bg-green-500 text-white shadow-green-500/20" : "bg-primary-dark text-white shadow-primary/20")}>
                            {progress.completedLessonIds.includes(lesson.id) ? <><Icon name="check-circle-2" size={22} /> Aula Concluída</> : <><Icon name="play" size={22} fill="currentColor" /> Marcar como Concluída</>}
                        </button>
                    </div>

                    <div className="bg-white/5 p-6 rounded-[32px] border border-white/10 space-y-3">
                        <h4 className="font-bold text-white text-sm flex items-center gap-2">
                            <Icon name="star" size={16} className="text-primary" /> Dica de Ouro
                        </h4>
                        <p className="text-xs text-white/70 leading-relaxed font-medium">A porcelana fria encolhe cerca de 20% ao secar. Lembre-se disso ao modelar o tamanho final das suas joias!</p>
                    </div>
                </div>
            </div>
        );

        return (
            <div className="max-w-md mx-auto bg-background min-h-screen relative">
                <AnimatePresence mode="wait">
                    {selectedLesson ? (
                        <motion.div key="player" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
                            {renderLessonPlayer(selectedLesson)}
                        </motion.div>
                    ) : (
                        <motion.div key="main" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                            {activeTab === 'home' && renderHome()}
                            {activeTab === 'bonus' && (
                                <div className="p-6 space-y-8 pb-24">
                                    <div className="pt-4">
                                        <h1 className="text-3xl font-bold text-slate-800">Área de Bonos 🎁</h1>
                                        <p className="text-slate-500 mt-2 text-sm">Recursos extras para acelerar tus resultados.</p>
                                    </div>
                                    <div className="space-y-4">
                                        {BONUS_ITEMS.map(item => (
                                            <div key={item.id} className="bg-white p-5 rounded-[32px] border border-slate-100 shadow-sm flex items-center justify-between group active:scale-95 transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary-dark">
                                                        <Icon name={item.icon} size={24} />
                                                    </div>
                                                    <div>
                                                        <h3 className="font-bold text-slate-800 text-sm">{item.title}</h3>
                                                        <p className="text-[10px] text-slate-400 font-medium">{item.description}</p>
                                                    </div>
                                                </div>
                                                <Icon name="external-link" size={18} className="text-slate-400" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {activeTab === 'profile' && (
                                <div className="p-6 space-y-8 pb-24">
                                    <div className="text-center space-y-4 pt-4">
                                        <div className="w-24 h-24 rounded-full bg-primary/20 border-4 border-white shadow-lg mx-auto overflow-hidden relative">
                                            <img src="https://i.pravatar.cc/150?u=artesa" alt="profile" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-800">Artesana de Éxito</h2>
                                            <p className="text-sm text-slate-400">Miembro desde Abril de 2026</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-5 rounded-[32px] border border-slate-100 text-center shadow-sm">
                                            <p className="text-2xl font-bold text-primary-dark">{progress.completedLessonIds.length}</p>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Completadas</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-[32px] border border-slate-100 text-center shadow-sm">
                                            <p className="text-2xl font-bold text-primary-dark">{progress.favoriteLessonIds.length}</p>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Favoritos</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsLoggedIn(false)} className="w-full p-5 bg-red-50 text-red-500 rounded-[24px] font-bold border border-red-100 active:scale-95 transition-all">Cerrar Sesión</button>
                                </div>
                            )}
                        </motion.div>
                    )}
                </AnimatePresence>

                {!selectedLesson && (
                    <nav className="fixed bottom-6 left-6 right-6 max-w-md mx-auto bg-white/80 backdrop-blur-xl border border-white/20 rounded-[32px] p-2 flex justify-between items-center z-40 shadow-2xl">
                        <button onClick={() => setActiveTab('home')} className={cn("flex-1 flex flex-col items-center gap-1 py-3 rounded-2xl transition-all", activeTab === 'home' ? "bg-primary/10 text-primary-dark" : "text-slate-300")}>
                            <Icon name="home" size={20} />
                            <span className="text-[10px] font-bold">Inicio</span>
                        </button>
                        <button onClick={() => setActiveTab('bonus')} className={cn("flex-1 flex flex-col items-center gap-1 py-3 rounded-2xl transition-all", activeTab === 'bonus' ? "bg-primary/10 text-primary-dark" : "text-slate-300")}>
                            <Icon name="gift" size={20} />
                            <span className="text-[10px] font-bold">Bonos</span>
                        </button>
                        <button onClick={() => setActiveTab('profile')} className={cn("flex-1 flex flex-col items-center gap-1 py-3 rounded-2xl transition-all", activeTab === 'profile' ? "bg-primary/10 text-primary-dark" : "text-slate-300")}>
                            <Icon name="user" size={20} />
                            <span className="text-[10px] font-bold">Perfil</span>
                        </button>
                    </nav>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
