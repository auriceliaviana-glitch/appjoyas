 <!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f5f5;
}

/* BANNER */
.banner {
  width:100%;
  height:200px;
  background:url('https://i.imgur.com/3ZQ3Z6k.jpg') center/cover;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
}

/* PERFIL */
.profile {
  text-align:center;
  margin-top:-40px;
}

.profile img {
  width:80px;
  height:80px;
  border-radius:50%;
  border:4px solid white;
}

.profile h2 {
  margin:10px 0 5px;
}

.profile p {
  color:gray;
  font-size:14px;
}

/* CONTAINER */
.container {
  padding:20px;
}

/* CARDS */
.card {
  background:white;
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.card img {
  width:50px;
  height:50px;
  border-radius:10px;
  margin-right:10px;
}

.left {
  display:flex;
  align-items:center;
}

.title {
  font-size:14px;
}

.time {
  font-size:12px;
  color:gray;
}

/* MENU */
.menu {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #ddd;
}

/* AULA */
#aula {
  display:none;
  padding:20px;
  text-align:center;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner"></div>

<!-- PERFIL -->
<div class="profile">
  <img src="https://i.imgur.com/8Km9tLL.png">
  <h2>Hola, ¡Artesana! ✨</h2>
  <p>Bienvenida al curso de Isabella Torres</p>
</div>

<!-- LISTA -->
<div id="home" class="container">

  <h3>Módulo 1: Introducción</h3>

  <div class="card" onclick="abrirAula('4JGlMIsn3o8')">
    <div class="left">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <div>
        <div class="title">Bienvenida</div>
        <div class="time">3:00</div>
      </div>
    </div>
    ▶
  </div>

  <h3>Módulo 5: Cómo vender</h3>

  <div class="card" onclick="abrirAula('TknQZLggxxY')">
    <div class="left">
      <img src="https://i.imgur.com/8Km9tLL.png">
      <div>
        <div class="title">Cómo vender en Instagram</div>
        <div class="time">25:30</div>
      </div>
    </div>
    ▶
  </div>

</div>

<!-- AULA -->
<div id="aula">
  <iframe id="video"
    width="100%"
    height="250"
    src=""
    frameborder="0"
    allowfullscreen>
  </iframe>

  <br><br>

  <button onclick="voltar()">⬅ Voltar</button>
</div>

<!-- MENU -->
<div class="menu">
  <div onclick="voltar()">🏠<br>Inicio</div>
  <div>🎁<br>Bônus</div>
  <div>👤<br>Perfil</div>
</div>

<script>
function abrirAula(videoId){
  document.getElementById("home").style.display="none";
  document.getElementById("aula").style.display="block";
  document.getElementById("video").src="https://www.youtube.com/embed/"+videoId;
}

function voltar(){
  document.getElementById("home").style.display="block";
  document.getElementById("aula").style.display="none";
  document.getElementById("video").src="";
}
</script>

</body>
</html>
